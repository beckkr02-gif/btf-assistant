<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTF Assistant | Better Tomorrow Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --gold: #C5A028;
            --gold-dim: rgba(197,160,40,0.12);
            --text: #fff;
            --dim: #666;
            --green: #4ade80;
            --red: #f87171;
            --blue: #60a5fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { touch-action: manipulation; -ms-touch-action: manipulation; }
        input, select, textarea, button { touch-action: manipulation; font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #app {
            width: 100%; height: 100vh; max-width: 520px;
            display: flex; flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* ── HEADER ── */
        #hdr {
            padding: 18px 20px; text-align: center;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        #hdr h1 {
            font-family: 'Cinzel', serif; font-size: 1rem;
            color: var(--gold); letter-spacing: 5px; text-transform: uppercase;
        }
        #hdr p { font-size: 0.65rem; color: var(--dim); margin-top: 3px; letter-spacing: 2px; text-transform: uppercase; }

        /* ── CHAT ── */
        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }

        /* ── MESSAGES ── */
        .m { max-width: 88%; padding: 12px 16px; font-size: 14px; line-height: 1.6; animation: mIn .35s ease-out; }
        @keyframes mIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .bot { align-self: flex-start; background: var(--surface); border-left: 2px solid var(--gold); }
        .usr { align-self: flex-end; background: #fff; color: #000; font-weight: 600; }

        /* ── OPTION BUTTONS ── */
        .opts { display: flex; flex-direction: column; gap: 8px; animation: mIn .4s ease-out; }
        .ob {
            background: transparent; color: var(--text); border: 1px solid var(--border);
            padding: 13px 18px; cursor: pointer; text-align: left; font-size: 14px;
            font-family: 'Inter', sans-serif; letter-spacing: .5px; transition: .2s;
            touch-action: manipulation;
        }
        .ob:hover { border-color: var(--gold); background: var(--gold-dim); }
        .ob .ob-icon { margin-right: 10px; }

        /* ── HEIGHT PICKER ── */
        .ht-pick { display: flex; flex-wrap: wrap; gap: 8px; animation: mIn .4s ease-out; }
        .ht-btn {
            flex: 0 0 calc(25% - 6px); padding: 14px 0; background: var(--surface);
            border: 1px solid var(--border); color: var(--text); font-size: 15px;
            font-family: 'Inter', sans-serif; font-weight: 600; text-align: center;
            cursor: pointer; transition: .2s; touch-action: manipulation;
        }
        .ht-btn:hover, .ht-btn:active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

        /* ── STAT CARDS ── */
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 22px; text-align: center; animation: mIn .5s ease-out;
        }
        .stat-card.gold-border { border-color: var(--gold); }
        .stat-card .lbl { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
        .stat-card .val { font-size: 48px; font-weight: 800; color: var(--gold); margin: 6px 0 2px; }
        .stat-card .val.white { color: #fff; }
        .stat-card .sub { font-size: 12px; color: var(--dim); }

        /* ── RESULT CANVAS ── */
        .rz { position: relative; width: 100%; animation: mIn .5s ease-out; }
        .rz canvas { width: 100%; display: block; transition: filter .6s ease; }
        .rz.locked canvas { filter: blur(18px) brightness(.5); }
        .lock-ov {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,.35);
            padding: 30px; text-align: center; z-index: 5;
        }
        .lock-ov .ico { font-size: 30px; margin-bottom: 10px; }
        .lock-ov h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: .85rem; letter-spacing: 3px; margin-bottom: 5px; }
        .lock-ov p { font-size: 12px; color: #aaa; margin-bottom: 16px; max-width: 280px; }
        .lock-ov input {
            width: 100%; max-width: 280px; background: #111; border: 1px solid var(--gold);
            color: #fff; padding: 12px; text-align: center; font-size: 14px; outline: none; margin-bottom: 10px;
        }
        .lock-ov input::placeholder { color: #444; }
        .lock-ov button {
            background: var(--gold); color: #000; border: none; padding: 12px 36px;
            font-family: 'Cinzel', serif; font-weight: 700; font-size: .7rem;
            letter-spacing: 2px; cursor: pointer;
        }

        /* ── GOAL SWITCHER ── */
        .gsw { display: flex; gap: 6px; animation: mIn .4s ease-out; }
        .gb {
            flex: 1; padding: 10px 4px; background: var(--surface); border: 1px solid var(--border);
            color: var(--text); font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600;
            letter-spacing: .5px; text-transform: uppercase; cursor: pointer; text-align: center; transition: .2s;
        }
        .gb:hover, .gb.act { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

        /* ── CTA ── */
        .cta {
            display: block; text-align: center; padding: 14px; background: #fff;
            color: #000; font-weight: 700; font-size: 13px; text-decoration: none;
            letter-spacing: 1px; transition: .2s; animation: mIn .4s ease-out;
        }
        .cta:hover { background: var(--gold); }
        .cta-gold { background: var(--gold); color: #000; }
        .cta-gold:hover { background: #d4af37; }

        /* ── MEAL PLAN CARD ── */
        .meal-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; animation: mIn .5s ease-out;
        }
        .meal-card h4 {
            font-family: 'Cinzel', serif; color: var(--gold); font-size: .8rem;
            letter-spacing: 2px; margin-bottom: 14px; text-align: center;
        }
        .meal-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #111;
        }
        .meal-item:last-child { border-bottom: none; }
        .meal-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .meal-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .meal-macros { font-size: 11px; color: var(--dim); text-align: right; white-space: nowrap; }
        .meal-total {
            margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gold);
            display: flex; justify-content: space-between; font-weight: 700; font-size: 13px;
        }
        .meal-total .gold { color: var(--gold); }
        .meal-disclaimer { font-size: 10px; color: #444; text-align: center; margin-top: 10px; font-style: italic; }

        /* ── PROGRESS PROJECTOR ── */
        .prog-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 22px; animation: mIn .5s ease-out;
        }
        .prog-card h4 {
            font-family: 'Cinzel', serif; color: var(--gold); font-size: .8rem;
            letter-spacing: 2px; margin-bottom: 16px; text-align: center;
        }
        .prog-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #111;
        }
        .prog-row:last-child { border-bottom: none; }
        .prog-week { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .prog-weight { font-size: 18px; font-weight: 700; color: var(--text); }
        .prog-change { font-size: 12px; font-weight: 600; }
        .prog-change.loss { color: var(--green); }
        .prog-change.gain { color: var(--blue); }
        .prog-note { font-size: 11px; color: #444; text-align: center; margin-top: 14px; font-style: italic; }

        /* ── COACHING CARD ── */
        .coach-card {
            background: var(--surface); border: 1px solid var(--gold);
            padding: 28px 22px; text-align: center; animation: mIn .5s ease-out;
        }
        .coach-card h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: .9rem; letter-spacing: 2px; margin-bottom: 12px; }
        .coach-card p { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 16px; }
        .coach-card ul { list-style: none; text-align: left; padding: 0; margin-bottom: 20px; }
        .coach-card li { font-size: 13px; color: var(--text); padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .coach-card li::before { content: "✦ "; color: var(--gold); }

        /* ── INPUT BAR ── */
        #ibar {
            padding: 14px 20px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; flex-shrink: 0;
        }
        #ibar input {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            color: #fff; padding: 12px; font-size: 16px; font-family: 'Inter', sans-serif; outline: none;
            border-radius: 0; -webkit-appearance: none; appearance: none;
        }
        #ibar input:focus { border-color: var(--gold); }
        #ibar button {
            background: #fff; color: #000; border: none; padding: 0 18px;
            font-weight: 700; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer;
        }

        .gold { color: var(--gold); }
        .dim { color: var(--dim); font-size: 12px; }

        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 480px) {
            #hdr { padding: 12px 16px; }
            #hdr h1 { font-size: 0.85rem; letter-spacing: 3px; }
            #hdr p { font-size: 0.6rem; }
            #chat { padding: 14px; gap: 10px; }
            .m { font-size: 13px; padding: 10px 14px; max-width: 92%; }
            .ob { padding: 11px 14px; font-size: 12px; }
            #ibar { padding: 10px 12px; gap: 8px; }
            #ibar input { padding: 12px; font-size: 16px; }
            .stat-card .val { font-size: 36px; }
            .stat-card { padding: 16px; }
            .coach-card { padding: 20px 16px; }
            .meal-macros { font-size: 10px; }
            .meal-name { font-size: 13px; }
            .rz canvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <h1>BTF Assistant</h1>
        <p>Better Tomorrow Fitness</p>
    </div>
    <div id="chat"></div>
    <div id="ibar">
        <input type="text" id="inp" placeholder="Type here..." autocomplete="off">
        <button id="sbtn">SEND</button>
    </div>
</div>

<script>
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');

const URLS = {
    program: 'https://www.bettertomorrowfitness.com/product-page/btf-4-week-custom-program',
    coaching: 'https://forms.gle/CBc71KbhJGwZ8TZa9',
};
const GOLD = '#C5A028';

// ─── CONFIGURE: Paste your Google Sheets webhook URL here ───
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw5h5OgFOH6KyiNQr_LGqjUEXakjpDuHETW69BsNMzAD1pAEzAm8GhvqN8p2kgBjsilgQ/exec';  // <-- PASTE YOUR GOOGLE APPS SCRIPT URL HERE

// ─── Lead Storage ───
let leads = JSON.parse(localStorage.getItem('btf_leads') || '[]');

function saveLead(data) {
    const entry = {
        timestamp: new Date().toISOString(),
        ...data
    };

    // Local backup
    leads.push(entry);
    localStorage.setItem('btf_leads', JSON.stringify(leads));
    console.log('📧 BTF LEAD:', entry);

    // Send to Google Sheets
    if (WEBHOOK_URL) {
        fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                timestamp: entry.timestamp,
                name: entry.name || '',
                email: entry.email || '',
                tool: entry.tool || '',
                bmr: entry.bmr || '',
                tdee: entry.tdee || '',
                goal: entry.goal || '',
                calories: entry.macros ? entry.macros.cal : '',
                protein: entry.macros ? entry.macros.p : '',
                fat: entry.macros ? entry.macros.f : '',
                carbs: entry.macros ? entry.macros.c : '',
                weight: entry.weight || '',
                age: entry.age || '',
                sex: entry.sex || '',
                exercise: entry.exercise || '',
                oneRM: entry.oneRM || ''
            })
        }).catch(err => console.warn('Webhook failed:', err));
    }
}

// ─── State ───
let S = { step: 'ask_name', d: {} };

// ─── UI Helpers ───
function scroll() { setTimeout(() => chat.scrollTop = chat.scrollHeight, 60); }

function say(html, cls = 'bot') {
    const el = document.createElement('div');
    el.className = `m ${cls}`;
    el.innerHTML = html;
    chat.appendChild(el);
    scroll();
}

function opts(list) {
    const w = document.createElement('div');
    w.className = 'opts';
    list.forEach(o => {
        const b = document.createElement('button');
        b.className = 'ob';
        b.innerHTML = (o.icon ? `<span class="ob-icon">${o.icon}</span>` : '') + o.label;
        b.onclick = () => { w.remove(); say(o.label, 'usr'); route(o.value); };
        w.appendChild(b);
    });
    chat.appendChild(w);
    scroll();
}

function showHeightPicker(type) {
    const w = document.createElement('div');
    w.className = 'ht-pick';
    if (type === 'feet') {
        [4, 5, 6, 7].forEach(ft => {
            const b = document.createElement('button');
            b.className = 'ht-btn';
            b.textContent = ft + "'";
            b.onclick = () => { w.remove(); say(ft + " ft", 'usr'); route(String(ft)); };
            w.appendChild(b);
        });
    } else {
        for (let i = 0; i <= 11; i++) {
            const b = document.createElement('button');
            b.className = 'ht-btn';
            b.textContent = i + '"';
            b.onclick = () => { w.remove(); say(i + ' in', 'usr'); route(String(i)); };
            w.appendChild(b);
        }
    }
    chat.appendChild(w);
    scroll();
}

function addEl(html) {
    const t = document.createElement('div');
    t.innerHTML = html.trim();
    const el = t.firstElementChild;
    chat.appendChild(el);
    scroll();
    return el;
}

function parseHt(h) {
    const s = h.toString().replace(/[""]/g, '');
    if (s.includes("'")) { const p = s.split("'"); return (parseInt(p[0]) * 12) + (parseInt(p[1]) || 0); }
    if (/ft/i.test(s)) { const p = s.split(/ft\.?\s*/i); return (parseInt(p[0]) * 12) + (parseInt(p[1]) || 0); }
    return parseFloat(s);
}

// ─── Formulas ───
function calcBMR() {
    const wKg = S.d.weight * 0.453592, hCm = S.d.height * 2.54;
    let bmr = (10 * wKg) + (6.25 * hCm) - (5 * S.d.age);
    return Math.round(S.d.sex === 'male' ? bmr + 5 : bmr - 161);
}

function calcMacros(tdee, goal) {
    let cal, pM, fM;
    if (goal === 'cut') { cal = tdee - 500; pM = 1.2; fM = 0.25; }
    else if (goal === 'bulk') { cal = tdee + 300; pM = 1.0; fM = 0.4; }
    else { cal = tdee; pM = 1.0; fM = 0.35; }
    const p = Math.round(S.d.weight * pM), f = Math.round(S.d.weight * fM);
    const c = Math.max(0, Math.round((cal - (p * 4) - (f * 9)) / 4));
    return { cal, p, f, c };
}

function calc1RM(w, r) { return Math.round(w * (1 + r / 30)); }

// ─── Meal Plan Database ───
const MEALS = {
    proteins: [
        { name: 'Grilled Chicken Breast (6oz)', p: 42, f: 3, c: 0, cal: 195 },
        { name: 'Lean Ground Turkey (6oz)', p: 38, f: 8, c: 0, cal: 224 },
        { name: 'Salmon Fillet (5oz)', p: 34, f: 12, c: 0, cal: 248 },
        { name: 'Egg Whites (6) + Whole Egg (1)', p: 28, f: 5, c: 1, cal: 161 },
        { name: 'Greek Yogurt (1 cup, nonfat)', p: 20, f: 0, c: 9, cal: 120 },
        { name: 'Lean Sirloin Steak (5oz)', p: 36, f: 8, c: 0, cal: 216 },
    ],
    carbs: [
        { name: 'White Rice (1 cup cooked)', p: 4, f: 0, c: 45, cal: 200 },
        { name: 'Sweet Potato (1 medium)', p: 2, f: 0, c: 26, cal: 112 },
        { name: 'Oats (1/2 cup dry)', p: 5, f: 3, c: 27, cal: 150 },
        { name: 'Whole Wheat Bread (2 slices)', p: 6, f: 2, c: 24, cal: 140 },
        { name: 'Brown Rice (1 cup cooked)', p: 5, f: 2, c: 45, cal: 216 },
        { name: 'Banana (1 large)', p: 1, f: 0, c: 31, cal: 121 },
    ],
    fats: [
        { name: 'Avocado (1/2 medium)', p: 1, f: 11, c: 6, cal: 120 },
        { name: 'Almonds (1oz)', p: 6, f: 14, c: 6, cal: 164 },
        { name: 'Olive Oil (1 tbsp)', p: 0, f: 14, c: 0, cal: 120 },
        { name: 'Peanut Butter (2 tbsp)', p: 7, f: 16, c: 6, cal: 190 },
    ],
    veggies: [
        { name: 'Broccoli (1 cup)', p: 3, f: 0, c: 6, cal: 31 },
        { name: 'Spinach (2 cups)', p: 2, f: 0, c: 2, cal: 14 },
        { name: 'Mixed Greens Salad', p: 1, f: 0, c: 3, cal: 15 },
        { name: 'Asparagus (6 spears)', p: 2, f: 0, c: 4, cal: 20 },
    ]
};

function generateMealPlan(targetCal, targetP, targetF, targetC) {
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const meals = [];
    let totP = 0, totF = 0, totC = 0, totCal = 0;

    // Meal 1: Breakfast
    const bPro = pick([MEALS.proteins[3], MEALS.proteins[4]]); // Eggs or yogurt
    const bCarb = pick([MEALS.carbs[2], MEALS.carbs[5]]); // Oats or banana
    meals.push({ label: 'Meal 1 — Breakfast', items: [bPro, bCarb] });

    // Meal 2: Lunch
    const lPro = pick([MEALS.proteins[0], MEALS.proteins[1], MEALS.proteins[5]]);
    const lCarb = pick([MEALS.carbs[0], MEALS.carbs[4]]);
    const lVeg = pick(MEALS.veggies);
    meals.push({ label: 'Meal 2 — Lunch', items: [lPro, lCarb, lVeg] });

    // Meal 3: Dinner
    const dPro = pick([MEALS.proteins[0], MEALS.proteins[2], MEALS.proteins[5]]);
    const dCarb = pick([MEALS.carbs[1], MEALS.carbs[0]]);
    const dFat = pick(MEALS.fats);
    const dVeg = pick(MEALS.veggies);
    meals.push({ label: 'Meal 3 — Dinner', items: [dPro, dCarb, dFat, dVeg] });

    // Snack
    const snk = pick([MEALS.fats[1], MEALS.fats[3], MEALS.proteins[4]]);
    meals.push({ label: 'Snack', items: [snk] });

    meals.forEach(m => m.items.forEach(i => { totP += i.p; totF += i.f; totC += i.c; totCal += i.cal; }));
    return { meals, totP, totF, totC, totCal };
}

// ─── Canvas: TDEE Macro Card ───
function drawTDEE(canvas, goal) {
    const ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 5; ctx.strokeRect(2, 2, W - 4, H - 4);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.strokeRect(12, 12, W - 24, H - 24);

    ctx.textAlign = 'center';
    ctx.fillStyle = GOLD; ctx.font = '700 20px Inter';
    ctx.fillText('BETTER TOMORROW FITNESS', W/2, 48);
    ctx.fillStyle = '#444'; ctx.font = '400 11px Inter';
    ctx.fillText('CALORIE & MACRO PROFILE', W/2, 68);

    // Divider
    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(35, 82); ctx.lineTo(W-35, 82); ctx.stroke();

    // Client
    ctx.fillStyle = '#666'; ctx.font = '400 11px Inter'; ctx.textAlign = 'left';
    ctx.fillText(`CLIENT: ${S.d.name.toUpperCase()}`, 30, 105);
    ctx.fillText(`AGE: ${S.d.age}  |  SEX: ${S.d.sex.toUpperCase()}  |  ${S.d.weight} LBS  |  ${Math.floor(S.d.height/12)}'${S.d.height%12}"`, 30, 122);

    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(35, 138); ctx.lineTo(W-35, 138); ctx.stroke();

    // BMR
    ctx.textAlign = 'center'; ctx.fillStyle = '#555'; ctx.font = '400 10px Inter';
    ctx.fillText('BASAL METABOLIC RATE (BMR)', W/2, 162);
    ctx.fillStyle = '#fff'; ctx.font = '700 32px Inter';
    ctx.fillText(S.d.bmr.toLocaleString(), W/2, 198);
    ctx.fillStyle = '#555'; ctx.font = '400 10px Inter';
    ctx.fillText('CALORIES / DAY AT REST', W/2, 215);

    // TDEE
    ctx.fillStyle = GOLD; ctx.font = '400 10px Inter';
    ctx.fillText('TOTAL DAILY ENERGY EXPENDITURE', W/2, 248);
    ctx.fillStyle = '#fff'; ctx.font = '800 46px Inter';
    ctx.fillText(S.d.tdee.toLocaleString(), W/2, 296);
    ctx.fillStyle = GOLD; ctx.font = '400 11px Inter';
    ctx.fillText('MAINTENANCE CALORIES / DAY', W/2, 316);

    ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(35, 336); ctx.lineTo(W-35, 336); ctx.stroke();

    // Goal
    const gL = { cut:'FAT LOSS (CUTTING)', bulk:'LEAN BULK', maintenance:'MAINTENANCE' };
    const gC = { cut:'-500 KCAL DEFICIT', bulk:'+300 KCAL SURPLUS', maintenance:'BASELINE' };
    ctx.fillStyle = GOLD; ctx.font = '700 14px Inter';
    ctx.fillText(`GOAL: ${gL[goal]}`, W/2, 362);
    ctx.fillStyle = '#555'; ctx.font = '400 10px Inter';
    ctx.fillText(gC[goal], W/2, 380);

    const m = calcMacros(S.d.tdee, goal);
    ctx.fillStyle = '#fff'; ctx.font = '700 28px Inter';
    ctx.fillText(`${m.cal.toLocaleString()} KCAL`, W/2, 418);
    ctx.fillStyle = '#555'; ctx.font = '400 10px Inter';
    ctx.fillText('DAILY TARGET', W/2, 436);

    // Macro boxes
    const bW = 130, bH = 75, bY = 458, gap = 12;
    const total = bW * 3 + gap * 2;
    const sX = (W - total) / 2;
    const macros = [
        { label:'PROTEIN', v: m.p, clr:'#4ade80', pct: Math.round((m.p*4/m.cal)*100) },
        { label:'FAT', v: m.f, clr:'#f87171', pct: Math.round((m.f*9/m.cal)*100) },
        { label:'CARBS', v: m.c, clr:'#60a5fa', pct: Math.round((m.c*4/m.cal)*100) },
    ];
    macros.forEach((mc, i) => {
        const x = sX + i * (bW + gap);
        ctx.fillStyle = '#111'; ctx.fillRect(x, bY, bW, bH);
        ctx.strokeStyle = '#222'; ctx.strokeRect(x, bY, bW, bH);
        ctx.fillStyle = mc.clr; ctx.fillRect(x, bY, bW, 3);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#777'; ctx.font = '400 9px Inter'; ctx.fillText(mc.label, x + bW/2, bY + 20);
        ctx.fillStyle = '#fff'; ctx.font = '700 20px Inter'; ctx.fillText(`${mc.v}g`, x + bW/2, bY + 46);
        ctx.fillStyle = '#555'; ctx.font = '400 9px Inter'; ctx.fillText(`${mc.pct}%`, x + bW/2, bY + 64);
    });

    // Footer
    ctx.textAlign = 'center';
    ctx.fillStyle = '#333'; ctx.font = '400 9px Inter';
    ctx.fillText('MIFFLIN-ST JEOR EQUATION  ·  BETTERTOMORROWFITNESS.COM', W/2, H - 35);
    ctx.fillStyle = GOLD; ctx.font = '400 10px Inter';
    ctx.fillText('CONSISTENCY > PERFECTION', W/2, H - 18);
}

// ─── Canvas: 1RM Card ───
function draw1RM(canvas) {
    const ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 5; ctx.strokeRect(2, 2, W - 4, H - 4);

    ctx.textAlign = 'center';
    ctx.fillStyle = GOLD; ctx.font = '700 20px Inter';
    ctx.fillText('BETTER TOMORROW FITNESS', W/2, 48);
    ctx.fillStyle = '#444'; ctx.font = '400 11px Inter';
    ctx.fillText('1-REP MAX PROFILE', W/2, 68);

    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(35, 85); ctx.lineTo(W-35, 85); ctx.stroke();

    ctx.fillStyle = '#666'; ctx.font = '400 11px Inter'; ctx.textAlign = 'left';
    ctx.fillText(`ATHLETE: ${S.d.name.toUpperCase()}`, 30, 110);
    ctx.fillText(`EXERCISE: ${(S.d.exercise || 'N/A').toUpperCase()}`, 30, 127);

    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(35, 145); ctx.lineTo(W-35, 145); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = '#555'; ctx.font = '400 10px Inter';
    ctx.fillText('ESTIMATED 1-REP MAX (EPLEY FORMULA)', W/2, 172);

    ctx.fillStyle = '#fff'; ctx.font = '800 64px Inter';
    ctx.fillText(`${S.d.oneRM}`, W/2, 240);
    ctx.fillStyle = GOLD; ctx.font = '700 18px Inter';
    ctx.fillText('LBS', W/2, 265);

    ctx.fillStyle = '#555'; ctx.font = '400 11px Inter';
    ctx.fillText(`BASED ON ${S.d.liftWeight} LBS × ${S.d.liftReps} REPS`, W/2, 295);

    // Percentage table
    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(35, 320); ctx.lineTo(W-35, 320); ctx.stroke();

    ctx.fillStyle = GOLD; ctx.font = '700 12px Inter';
    ctx.fillText('TRAINING PERCENTAGES', W/2, 345);

    const pcts = [
        { pct: '95%', reps: '2 reps' }, { pct: '90%', reps: '4 reps' },
        { pct: '85%', reps: '6 reps' }, { pct: '80%', reps: '8 reps' },
        { pct: '75%', reps: '10 reps' }, { pct: '70%', reps: '12 reps' },
    ];
    pcts.forEach((p, i) => {
        const y = 370 + i * 24;
        const val = Math.round(S.d.oneRM * (parseInt(p.pct) / 100));
        ctx.textAlign = 'left';
        ctx.fillStyle = '#777'; ctx.font = '400 11px Inter'; ctx.fillText(p.pct, 80, y);
        ctx.fillStyle = '#fff'; ctx.font = '600 13px Inter'; ctx.fillText(`${val} lbs`, W/2 - 30, y);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#555'; ctx.font = '400 11px Inter'; ctx.fillText(p.reps, W - 80, y);
    });

    ctx.textAlign = 'center';
    ctx.fillStyle = GOLD; ctx.font = '400 10px Inter';
    ctx.fillText('CONSISTENCY > PERFECTION', W/2, H - 18);
}

// ─── Route ───
function route(input) {
    const step = S.step;

    // ── NAME ──
    if (step === 'ask_name') {
        S.d.name = input;
        say(`Good to meet you, <span class="gold">${S.d.name}</span>. I'm the BTF Assistant — here to help you train smarter and build a better tomorrow.`);
        setTimeout(() => showMenu(), 600);

    // ── MENU ──
    } else if (step === 'menu' || step === 'post_result' || step === 'meal_done') {
        if (input === 'meal_again') {
            showMealPlan();
            return;
        }
        if (input === 'tdee_start') {
            S.step = 'tdee_sex';
            say("Let's build your calorie profile. What is your biological sex?");
            opts([ { label: 'Male', value: 'male' }, { label: 'Female', value: 'female' } ]);
        } else if (input === '1rm_start') {
            S.step = '1rm_exercise';
            say("Let's estimate your max strength. What exercise are we testing? (e.g. Bench Press, Squat, Deadlift)");
        } else if (input === 'meal_start') {
            if (S.d.tdee && S.d.goal) {
                showMealPlan();
            } else {
                say("To generate a meal plan, I need your calorie and macro targets first. Let's calculate those.");
                S.step = 'tdee_sex';
                setTimeout(() => {
                    say("What is your biological sex?");
                    opts([ { label: 'Male', value: 'male' }, { label: 'Female', value: 'female' } ]);
                }, 400);
                S.d._afterTdee = 'meal';
            }
        } else if (input === 'progress_start') {
            if (S.d.tdee && S.d.goal) {
                showProgressProjector();
            } else {
                say("To project your progress, I need your stats first. Let's run the numbers.");
                S.step = 'tdee_sex';
                setTimeout(() => {
                    say("What is your biological sex?");
                    opts([ { label: 'Male', value: 'male' }, { label: 'Female', value: 'female' } ]);
                }, 400);
                S.d._afterTdee = 'progress';
            }
        } else if (input === 'coaching') {
            showCoaching();
        } else if (input === 'program') {
            say("The BTF 4-Week Custom Program is built to match your goals, your schedule, and your body. Every set has a purpose.");
            addEl(`<a href="${URLS.program}" target="_blank" class="cta">VIEW 4-WEEK PROGRAM →</a>`);
            setTimeout(() => showMenu(), 1000);
        } else if (input === 'back_menu') {
            showMenu();
        }

    // ── TDEE FLOW ──
    } else if (step === 'tdee_sex') {
        S.d.sex = input; S.step = 'tdee_age';
        inp.inputMode = 'numeric';
        say("How old are you?");
    } else if (step === 'tdee_age') {
        const v = parseInt(input);
        if (isNaN(v) || v < 10 || v > 120) { say("Enter a valid age."); return; }
        S.d.age = v; S.step = 'tdee_weight';
        inp.inputMode = 'decimal';
        say("What's your current body weight in pounds?");
    } else if (step === 'tdee_weight') {
        const v = parseFloat(input);
        if (isNaN(v) || v < 50 || v > 700) { say("Enter a valid weight in lbs."); return; }
        S.d.weight = v; S.step = 'tdee_feet';
        say("What's your height? Select your feet:");
        showHeightPicker('feet');
    } else if (step === 'tdee_feet') {
        S.d._feet = parseInt(input);
        say(`${S.d._feet} feet — and how many inches?`);
        showHeightPicker('inches');
        S.step = 'tdee_inches';
    } else if (step === 'tdee_inches') {
        const inches = parseInt(input);
        S.d.height = (S.d._feet * 12) + inches;
        say(`Got it — ${S.d._feet}'${inches}"`, 'usr');

        // Calculate BMR
        S.d.bmr = calcBMR();
        say("Here's your resting metabolic rate — the calories your body burns just to stay alive.");
        setTimeout(() => {
            addEl(`<div class="stat-card"><div class="lbl">Basal Metabolic Rate</div><div class="val">${S.d.bmr.toLocaleString()}</div><div class="sub">calories / day at rest</div></div>`);
            setTimeout(() => {
                say("Now let's factor in your activity level to get your <span class='gold'>TDEE</span>.");
                opts([
                    { label: 'Sedentary — Desk job, little exercise', value: '1.2' },
                    { label: 'Light Activity — 1-3 days/week', value: '1.375' },
                    { label: 'Moderate — 3-5 days/week', value: '1.55' },
                    { label: 'Very Active — 6-7 days hard training', value: '1.725' },
                    { label: 'Athlete — 2x/day or physical job', value: '1.9' },
                ]);
                S.step = 'tdee_activity';
            }, 700);
        }, 400);

    } else if (step === 'tdee_activity') {
        S.d.activity = parseFloat(input);
        S.d.tdee = Math.round(S.d.bmr * S.d.activity);
        addEl(`<div class="stat-card gold-border"><div class="lbl">Your TDEE — Maintenance Calories</div><div class="val white">${S.d.tdee.toLocaleString()}</div><div class="sub">calories / day to maintain weight</div></div>`);
        setTimeout(() => {
            say(`<span class="gold">${S.d.name}</span>, your numbers are in. Want to see a full macro breakdown for your goal — completely <span class="gold">free</span>?`);
            say("Enter your email to unlock your personalized BTF Macro Card.");
            S.step = 'tdee_email';
        }, 700);

    } else if (step === 'tdee_email') {
        if (!input.includes('@') || !input.includes('.')) { say("Please enter a valid email."); return; }
        S.d.email = input;
        say("Now pick your primary goal:");
        opts([
            { icon: '🔥', label: 'Fat Loss (Cutting)', value: 'cut' },
            { icon: '💪', label: 'Muscle Gain (Lean Bulk)', value: 'bulk' },
            { icon: '⚖️', label: 'Maintenance', value: 'maintenance' },
        ]);
        S.step = 'tdee_goal';

    } else if (step === 'tdee_goal') {
        S.d.goal = input;
        // Check if we were redirected here from meal/progress
        if (S.d._afterTdee === 'meal') {
            delete S.d._afterTdee;
            showTDEECard(input, false);
            // After unlock, auto-show meal plan in the soft sell
        } else if (S.d._afterTdee === 'progress') {
            delete S.d._afterTdee;
            showTDEECard(input, false);
        } else {
            showTDEECard(input, false);
        }
    } else if (step === 'tdee_unlocked') {
        S.d.goal = input;
        showTDEECard(input, true);

    // ── 1RM FLOW ──
    } else if (step === '1rm_exercise') {
        S.d.exercise = input; S.step = '1rm_weight';
        say(`${input} — solid choice. What weight did you use? (lbs)`);
    } else if (step === '1rm_weight') {
        const v = parseFloat(input);
        if (isNaN(v) || v < 1) { say("Enter a valid weight."); return; }
        S.d.liftWeight = v; S.step = '1rm_reps';
        say("How many reps did you complete?");
    } else if (step === '1rm_reps') {
        const v = parseInt(input);
        if (isNaN(v) || v < 1 || v > 30) { say("Enter a valid rep count (1-30)."); return; }
        S.d.liftReps = v;
        S.d.oneRM = calc1RM(S.d.liftWeight, v);

        say("Your strength profile is ready. Enter your email to unlock the full breakdown with training percentages.");
        S.step = '1rm_email';

    } else if (step === '1rm_email') {
        if (!input.includes('@') || !input.includes('.')) { say("Please enter a valid email."); return; }
        S.d.email = input;
        show1RMCard();

    // ── FALLBACK ──
    } else {
        const hints = {
            'tdee_sex': "Choose Male or Female above.",
            'tdee_age': "I'm waiting for your age (just a number, like 28).",
            'tdee_weight': "I need your weight in pounds (e.g. 175).",
            'tdee_feet': "Tap your height in feet above.",
            'tdee_inches': "Tap your inches above.",
            'tdee_activity': "Select your activity level from the options above.",
            'tdee_email': "Enter your email address to unlock your macro breakdown.",
            'tdee_goal': "Pick your goal from the options above — Cut, Bulk, or Maintain.",
            '1rm_weight': "Enter the weight you lifted in lbs.",
            '1rm_reps': "How many reps did you complete? (1-30)",
            '1rm_email': "Enter your email to unlock your 1RM profile.",
        };
        if (hints[step]) {
            say(hints[step]);
        } else {
            say("I appreciate the question! I'm a guided assistant, so I work best through the menu options below. Let me point you in the right direction.");
            showMenu();
        }
    }
}

    say(`Here's a sample day of eating for your <span class="gold">${S.d.goal === 'cut' ? 'fat loss' : S.d.goal === 'bulk' ? 'lean bulk' : 'maintenance'}</span> goal.`);

        });

    html += `<div class="meal-total"><span>DAILY TOTAL</span><span class="gold">${plan.totCal} cal · ${plan.totP}P · ${plan.totF}F · ${plan.totC}C</span></div>`;
    html += `<div class="meal-total"><span>YOUR TARGET</span><span>${m.cal} cal · ${m.p}P · ${m.f}F · ${m.c}C</span></div>`;
    html += `<div class="meal-disclaimer">This is a sample template. Adjust portions to hit your exact targets. A full custom meal plan is included with BTF Coaching.</div>`;
    html += `</div>`;

    setTimeout(() => {
        addEl(html);
        setTimeout(() => {
            say("Want a different combination? Hit refresh, or get a full 7-day plan with coaching.");
            opts([
                { icon: '🔄', label: 'Generate Another Day', value: 'meal_again' },
                { icon: '🤝', label: 'Get Full Meal Plans with Coaching', value: 'coaching' },
                { icon: '🔙', label: 'Back to Menu', value: 'back_menu' },
            ]);
            S.step = 'meal_done';
        }, 500);
    }, 300);
}

// ─── Progress Projector ───
function showProgressProjector() {
    const goal = S.d.goal;
    let weeklyChange;
    if (goal === 'cut') weeklyChange = -1.0;  // ~1 lb/week loss at 500 deficit
    else if (goal === 'bulk') weeklyChange = 0.5;  // ~0.5 lb/week gain at 300 surplus
    else weeklyChange = 0;

    const milestones = [4, 8, 12];
    const isLoss = weeklyChange < 0;

    say(`Based on your <span class="gold">${goal === 'cut' ? 'fat loss' : goal === 'bulk' ? 'lean bulk' : 'maintenance'}</span> targets, here's what consistent effort looks like:`);

    let html = `<div class="prog-card"><h4>YOUR PROJECTED PROGRESS</h4>`;
    milestones.forEach(w => {
        const change = Math.round(weeklyChange * w * 10) / 10;
        const projected = Math.round((S.d.weight + change) * 10) / 10;
        const sign = change > 0 ? '+' : '';
        const cls = isLoss ? 'loss' : (change > 0 ? 'gain' : '');
        html += `<div class="prog-row">`;
        html += `<div class="prog-week">Week ${w}</div>`;
        html += `<div class="prog-weight">${projected} lbs</div>`;
        html += `<div class="prog-change ${cls}">${sign}${change} lbs</div>`;
        html += `</div>`;
    });

    if (goal === 'cut') {
        html += `<div class="prog-note">Based on a 500 cal/day deficit (~1 lb/week). Maintaining high protein preserves muscle tissue during the cut.</div>`;
    } else if (goal === 'bulk') {
        html += `<div class="prog-note">Based on a 300 cal/day surplus (~0.5 lb/week). A controlled surplus minimizes fat gain while maximizing muscle development.</div>`;
    } else {
        html += `<div class="prog-note">At maintenance, body weight stays relatively stable. This phase is ideal for body recomposition with proper training.</div>`;
    }
    html += `</div>`;

    setTimeout(() => {
        addEl(html);
        setTimeout(() => {
            if (goal !== 'maintenance') {
                say(`Imagine where you'll be in 12 weeks with real accountability. That's what <span class="gold">BTF Coaching</span> is built for.`);
            }
            opts([
                { icon: '🤝', label: 'Apply for Coaching — Accelerate Results', value: 'coaching' },
                { icon: '🔙', label: 'Back to Menu', value: 'back_menu' },
            ]);
            S.step = 'post_result';
        }, 600);
    }, 300);
}

// ─── TDEE Result Card ───
function showTDEECard(goal, unlocked) {
    document.querySelectorAll('.rz, .gsw, .cta').forEach(e => e.remove());

    const canvas = document.createElement('canvas');
    canvas.width = 480; canvas.height = 580;
    const zone = document.createElement('div');
    zone.className = 'rz' + (unlocked ? '' : ' locked');
    zone.appendChild(canvas);

    if (!unlocked) {
        const ov = document.createElement('div');
        ov.className = 'lock-ov';
        ov.innerHTML = `<div class="ico">🔒</div><h3>RESULTS LOCKED</h3><p>Your macro breakdown is ready. Tap unlock to reveal and save.</p><button id="ubtn">UNLOCK MY RESULTS</button>`;
        zone.appendChild(ov);
    }

    chat.appendChild(zone);
    drawTDEE(canvas, goal);
    scroll();

    if (!unlocked) {
        document.getElementById('ubtn').onclick = () => {
            zone.classList.remove('locked');
            zone.querySelector('.lock-ov').remove();
            S.step = 'tdee_unlocked';

            // Save lead with results
            const m = calcMacros(S.d.tdee, goal);
            saveLead({
                name: S.d.name, email: S.d.email,
                tool: 'Calorie Calculator',
                bmr: S.d.bmr, tdee: S.d.tdee, goal: goal,
                macros: m, age: S.d.age, sex: S.d.sex,
                weight: S.d.weight, height: S.d.height
            });

            say("Your BTF Macro Card is unlocked! On mobile, long-press to save as an image. 📲");
            setTimeout(() => {
                say("Switch goals to regenerate your card:");
                addGoalSwitch();
                showSoftSell();
            }, 500);
        };
    } else {
        setTimeout(() => scroll(), 100);
    }
}

// ─── Goal Switcher ───
function addGoalSwitch() {
    document.querySelectorAll('.gsw').forEach(e => e.remove());
    const w = document.createElement('div');
    w.className = 'gsw';
    ['cut', 'bulk', 'maintenance'].forEach(g => {
        const b = document.createElement('button');
        b.className = 'gb' + (S.d.goal === g ? ' act' : '');
        b.textContent = g === 'cut' ? '🔥 CUT' : g === 'bulk' ? '💪 BULK' : '⚖️ MAINTAIN';
