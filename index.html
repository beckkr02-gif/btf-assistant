<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTF Assistant | Better Tomorrow Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --gold: #C5A028;
            --gold-dim: rgba(197,160,40,0.12);
            --text: #fff;
            --dim: #666;
            --green: #4ade80;
            --red: #f87171;
            --blue: #60a5fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { touch-action: manipulation; -ms-touch-action: manipulation; }
        input, select, textarea, button { touch-action: manipulation; font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #app {
            width: 100%; height: 100vh; max-width: 520px;
            display: flex; flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* ── HEADER ── */
        #hdr {
            padding: 18px 20px; text-align: center;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        #hdr h1 {
            font-family: 'Cinzel', serif; font-size: 1rem;
            color: var(--gold); letter-spacing: 5px; text-transform: uppercase;
        }
        #hdr p { font-size: 0.65rem; color: var(--dim); margin-top: 3px; letter-spacing: 2px; text-transform: uppercase; }

        /* ── CHAT ── */
        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }

        /* ── MESSAGES ── */
        .m { max-width: 88%; padding: 12px 16px; font-size: 14px; line-height: 1.6; animation: mIn .35s ease-out; }
        @keyframes mIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .bot { align-self: flex-start; background: var(--surface); border-left: 2px solid var(--gold); }
        .usr { align-self: flex-end; background: #fff; color: #000; font-weight: 600; }

        /* ── OPTION BUTTONS ── */
        .opts { display: flex; flex-direction: column; gap: 8px; animation: mIn .4s ease-out; }
        .ob {
            background: transparent; color: var(--text); border: 1px solid var(--border);
            padding: 13px 18px; cursor: pointer; text-align: left; font-size: 14px;
            font-family: 'Inter', sans-serif; letter-spacing: .5px; transition: .2s;
            touch-action: manipulation;
        }
        .ob:hover { border-color: var(--gold); background: var(--gold-dim); }
        .ob .ob-icon { margin-right: 10px; }

        /* ── HEIGHT PICKER ── */
        .ht-pick { display: flex; flex-wrap: wrap; gap: 8px; animation: mIn .4s ease-out; }
        .ht-btn {
            flex: 0 0 calc(25% - 6px); padding: 14px 0; background: var(--surface);
            border: 1px solid var(--border); color: var(--text); font-size: 15px;
            font-family: 'Inter', sans-serif; font-weight: 600; text-align: center;
            cursor: pointer; transition: .2s; touch-action: manipulation;
        }
        .ht-btn:hover, .ht-btn:active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

        /* ── NUMBER PICKER ── */
        .num-pick { background: var(--surface); border: 1px solid var(--border); padding: 20px; animation: mIn .4s ease-out; }
        .np-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 14px; }
        .np-row { display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .np-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 56px; height: 56px; font-size: 26px; cursor: pointer; touch-action: manipulation; transition: .15s; flex-shrink: 0; }
        .np-btn:hover, .np-btn:active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
        .np-display { display: flex; align-items: baseline; justify-content: center; min-width: 130px; gap: 5px; }
        .np-val { font-size: 44px; font-weight: 800; color: var(--gold); line-height: 1; }
        .np-unit { font-size: 13px; color: var(--dim); }
        .np-confirm { width: 100%; background: var(--gold); color: #000; border: none; padding: 13px; font-family: 'Cinzel', serif; font-weight: 700; font-size: .75rem; letter-spacing: 2px; cursor: pointer; touch-action: manipulation; }
        .np-confirm:hover { background: #d4af37; }

        /* ── UNDO BUTTON ── */
        .undo-wrap { text-align: right; padding: 2px 4px; }
        .undo-btn { font-size: 11px; color: #333; cursor: pointer; letter-spacing: .5px; transition: color .15s; user-select: none; }
        .undo-btn:hover { color: var(--gold); }

        /* ── STAT CARDS ── */
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 22px; text-align: center; animation: mIn .5s ease-out;
        }
        .stat-card.gold-border { border-color: var(--gold); }
        .stat-card .lbl { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
        .stat-card .val { font-size: 48px; font-weight: 800; color: var(--gold); margin: 6px 0 2px; }
        .stat-card .val.white { color: #fff; }
        .stat-card .sub { font-size: 12px; color: var(--dim); }

        /* ── RESULT CANVAS ── */
        .rz { position: relative; width: 100%; animation: mIn .5s ease-out; }
        .rz canvas { width: 100%; display: block; transition: filter .6s ease; }
        .rz.locked canvas { filter: blur(18px) brightness(.5); }
        .lock-ov {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,.35);
            padding: 30px; text-align: center; z-index: 5;
        }
        .lock-ov .ico { font-size: 30px; margin-bottom: 10px; }
        .lock-ov h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: .85rem; letter-spacing: 3px; margin-bottom: 5px; }
        .lock-ov p { font-size: 12px; color: #aaa; margin-bottom: 16px; max-width: 280px; }
        .lock-ov input {
            width: 100%; max-width: 280px; background: #111; border: 1px solid var(--gold);
            color: #fff; padding: 12px; text-align: center; font-size: 14px; outline: none; margin-bottom: 10px;
        }
        .lock-ov input::placeholder { color: #444; }
        .lock-ov button {
            background: var(--gold); color: #000; border: none; padding: 12px 36px;
            font-family: 'Cinzel', serif; font-weight: 700; font-size: .7rem;
            letter-spacing: 2px; cursor: pointer;
        }

        /* ── GOAL SWITCHER ── */
        .gsw { display: flex; gap: 6px; animation: mIn .4s ease-out; }
        .gb {
            flex: 1; padding: 10px 4px; background: var(--surface); border: 1px solid var(--border);
            color: var(--text); font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600;
            letter-spacing: .5px; text-transform: uppercase; cursor: pointer; text-align: center; transition: .2s;
        }
        .gb:hover, .gb.act { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

        /* ── CTA ── */
        .cta {
            display: block; text-align: center; padding: 14px; background: #fff;
            color: #000; font-weight: 700; font-size: 13px; text-decoration: none;
            letter-spacing: 1px; transition: .2s; animation: mIn .4s ease-out;
        }
        .cta:hover { background: var(--gold); }
        .cta-gold { background: var(--gold); color: #000; }
        .cta-gold:hover { background: #d4af37; }

        /* ── MEAL PLAN CARD ── */
        .meal-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; animation: mIn .5s ease-out;
        }
        .meal-card h4 {
            font-family: 'Cinzel', serif; color: var(--gold); font-size: .8rem;
            letter-spacing: 2px; margin-bottom: 14px; text-align: center;
        }
        .meal-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #111;
        }
        .meal-item:last-child { border-bottom: none; }
        .meal-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .meal-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .meal-macros { font-size: 11px; color: var(--dim); text-align: right; white-space: nowrap; }
        .meal-total {
            margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gold);
            display: flex; justify-content: space-between; font-weight: 700; font-size: 13px;
        }
        .meal-total .gold { color: var(--gold); }
        .meal-disclaimer { font-size: 10px; color: #444; text-align: center; margin-top: 10px; font-style: italic; }

        /* ── PROGRESS PROJECTOR ── */
        .prog-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 22px; animation: mIn .5s ease-out;
        }
        .prog-card h4 {
            font-family: 'Cinzel', serif; color: var(--gold); font-size: .8rem;
            letter-spacing: 2px; margin-bottom: 16px; text-align: center;
        }
        .prog-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #111;
        }
        .prog-row:last-child { border-bottom: none; }
        .prog-week { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .prog-weight { font-size: 18px; font-weight: 700; color: var(--text); }
        .prog-change { font-size: 12px; font-weight: 600; }
        .prog-change.loss { color: var(--green); }
        .prog-change.gain { color: var(--blue); }
        .prog-note { font-size: 11px; color: #444; text-align: center; margin-top: 14px; font-style: italic; }

        /* ── COACHING CARD ── */
        .coach-card {
            background: var(--surface); border: 1px solid var(--gold);
            padding: 28px 22px; text-align: center; animation: mIn .5s ease-out;
        }
        .coach-card h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: .9rem; letter-spacing: 2px; margin-bottom: 12px; }
        .coach-card p { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 16px; }
        .coach-card ul { list-style: none; text-align: left; padding: 0; margin-bottom: 20px; }
        .coach-card li { font-size: 13px; color: var(--text); padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .coach-card li::before { content: "✦ "; color: var(--gold); }

        /* ── INPUT BAR ── */
        #ibar {
            padding: 14px 20px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; flex-shrink: 0;
        }
        #ibar input {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            color: #fff; padding: 12px; font-size: 16px; font-family: 'Inter', sans-serif; outline: none;
            border-radius: 0; -webkit-appearance: none; appearance: none;
        }
        #ibar input:focus { border-color: var(--gold); }
        #ibar button {
            background: #fff; color: #000; border: none; padding: 0 18px;
            font-weight: 700; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer;
        }

        .gold { color: var(--gold); }
        .dim { color: var(--dim); font-size: 12px; }

        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 480px) {
            #hdr { padding: 12px 16px; }
            #hdr h1 { font-size: 0.85rem; letter-spacing: 3px; }
            #hdr p { font-size: 0.6rem; }
            #chat { padding: 14px; gap: 10px; }
            .m { font-size: 13px; padding: 10px 14px; max-width: 92%; }
            .ob { padding: 11px 14px; font-size: 12px; }
            #ibar { padding: 10px 12px; gap: 8px; }
            #ibar input { padding: 12px; font-size: 16px; }
            .stat-card .val { font-size: 36px; }
            .stat-card { padding: 16px; }
            .coach-card { padding: 20px 16px; }
            .meal-macros { font-size: 10px; }
            .meal-name { font-size: 13px; }
            .rz canvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <h1>BTF Assistant</h1>
        <p>Better Tomorrow Fitness</p>
    </div>
    <div id="chat"></div>
    <div id="ibar">
        <input type="text" id="inp" placeholder="Type here..." autocomplete="off">
        <button id="sbtn">SEND</button>
    </div>
</div>

<script>
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');

const URLS = {
    program: 'https://www.bettertomorrowfitness.com/product-page/btf-4-week-custom-program',
    coaching: 'https://forms.gle/CBc71KbhJGwZ8TZa9',
};
const GOLD = '#C5A028';

// ─── CONFIGURE: Paste your Google Sheets webhook URL here ───
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw5h5OgFOH6KyiNQr_LGqjUEXakjpDuHETW69BsNMzAD1pAEzAm8GhvqN8p2kgBjsilgQ/exec';  // <-- PASTE YOUR GOOGLE APPS SCRIPT URL HERE

// ─── Lead Storage ───
let leads = JSON.parse(localStorage.getItem('btf_leads') || '[]');

function saveLead(data) {
    const entry = {
        timestamp: new Date().toISOString(),
        ...data
    };

    // Local backup
    leads.push(entry);
    localStorage.setItem('btf_leads', JSON.stringify(leads));
    console.log('📧 BTF LEAD:', entry);

    // Send to Google Sheets
    if (WEBHOOK_URL) {
        fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                timestamp: entry.timestamp,
                name: entry.name || '',
                email: entry.email || '',
                tool: entry.tool || '',
                bmr: entry.bmr || '',
                tdee: entry.tdee || '',
                goal: entry.goal || '',
                calories: entry.macros ? entry.macros.cal : '',
                protein: entry.macros ? entry.macros.p : '',
                fat: entry.macros ? entry.macros.f : '',
                carbs: entry.macros ? entry.macros.c : '',
                weight: entry.weight || '',
                age: entry.age || '',
                sex: entry.sex || '',
                exercise: entry.exercise || '',
                oneRM: entry.oneRM || ''
            })
        }).catch(err => console.warn('Webhook failed:', err));
    }
}

// ─── State ───
let S = { step: 'menu', d: {}, history: [] };

// ─── History / Undo ───
function pushHistory() {
    S.history.push({ step: S.step, d: JSON.parse(JSON.stringify(S.d)), html: chat.innerHTML });
    if (S.history.length > 8) S.history.shift();
}

function showUndoButton() {
    document.querySelectorAll('.undo-wrap').forEach(e => e.remove());
    const wrap = document.createElement('div');
    wrap.className = 'undo-wrap';
    wrap.innerHTML = '<span class="undo-btn">← Undo</span>';
    wrap.querySelector('.undo-btn').onclick = () => {
        if (!S.history.length) return;
        const prev = S.history.pop();
        S.step = prev.step;
        S.d = prev.d;
        chat.innerHTML = prev.html;
        inp.inputMode = 'text';
        inp.type = 'text';
        scroll();
    };
    chat.appendChild(wrap);
    scroll();
}

// ─── Number Picker ───
function showNumberPicker({ label, min, max, value, step, unit, onConfirm }) {
    const w = document.createElement('div');
    w.className = 'num-pick';
    let current = value;
    const fmt = v => step < 1 ? v.toFixed(1) : String(Math.round(v));

    const render = () => {
        w.innerHTML = `
            <div class="np-label">${label}</div>
            <div class="np-row">
                <button class="np-btn" id="np-minus">−</button>
                <div class="np-display">
                    <span class="np-val">${fmt(current)}</span>
                    <span class="np-unit">${unit}</span>
                </div>
                <button class="np-btn" id="np-plus">+</button>
            </div>
            <button class="np-confirm">CONFIRM →</button>
        `;
        w.querySelector('#np-minus').addEventListener('click', () => {
            current = Math.max(min, Math.round((current - step) * 10) / 10);
            render();
        });
        w.querySelector('#np-plus').addEventListener('click', () => {
            current = Math.min(max, Math.round((current + step) * 10) / 10);
            render();
        });
        w.querySelector('.np-confirm').addEventListener('click', () => {
            w.remove();
            pushHistory();
            say(`${fmt(current)} ${unit}`, 'usr');
            showUndoButton();
            onConfirm(current);
        });
    };
    render();
    chat.appendChild(w);
    scroll();
}

// ─── UI Helpers ───
function scroll() { setTimeout(() => chat.scrollTop = chat.scrollHeight, 60); }

function say(html, cls = 'bot') {
    const el = document.createElement('div');
    el.className = `m ${cls}`;
    el.innerHTML = html;
    chat.appendChild(el);
    scroll();
}

function opts(list) {
    const w = document.createElement('div');
    w.className = 'opts';
    list.forEach(o => {
        const b = document.createElement('button');
        b.className = 'ob';
        b.innerHTML = (o.icon ? `<span class="ob-icon">${o.icon}</span>` : '') + o.label;
        b.onclick = () => { w.remove(); pushHistory(); say(o.label, 'usr'); showUndoButton(); route(o.value); };
        w.appendChild(b);
    });
    chat.appendChild(w);
    scroll();
}

function showHeightPicker(type) {
    const w = document.createElement('div');
    w.className = 'ht-pick';
    if (type === 'feet') {
        [4, 5, 6, 7].forEach(ft => {
            const b = document.createElement('button');
            b.className = 'ht-btn';
            b.textContent = ft + "'";
            b.onclick = () => { w.remove(); say(ft + " ft", 'usr'); route(String(ft)); };
            w.appendChild(b);
        });
    } else {
        for (let i = 0; i <= 11; i++) {
            const b = document.createElement('button');
            b.className = 'ht-btn';
            b.textContent = i + '"';
            b.onclick = () => { w.remove(); say(i + ' in', 'usr'); route(String(i)); };
            w.appendChild(b);
        }
    }
    chat.appendChild(w);
    scroll();
}

function addEl(html) {
    const t = document.createElement('div');
    t.innerHTML = html.trim();
    const el = t.firstElementChild;
    chat.appendChild(el);
    scroll();
    return el;
}

function parseHt(h) {
    const s = h.toString().replace(/[""]/g, '');
    if (s.includes("'")) { const p = s.split("'"); return (parseInt(p[0]) * 12) + (parseInt(p[1]) || 0); }
    if (/ft/i.test(s)) { const p = s.split(/ft\.?\s*/i); return (parseInt(p[0]) * 12) + (parseInt(p[1]) || 0); }
    return parseFloat(s);
}

// ─── Formulas ───
function calcBMR() {
    const wKg = S.d.weight * 0.453592, hCm = S.d.height * 2.54;
    let bmr = (10 * wKg) + (6.25 * hCm) - (5 * S.d.age);
    return Math.round(S.d.sex === 'male' ? bmr + 5 : bmr - 161);
}

function calcMacros(tdee, goal) {
    let cal, pM, fM;
    if (goal === 'cut') { cal = tdee - 500; pM = 1.2; fM = 0.25; }
    else if (goal === 'bulk') { cal = tdee + 300; pM = 1.0; fM = 0.4; }
    else { cal = tdee; pM = 1.0; fM = 0.35; }
    const p = Math.round(S.d.weight * pM), f = Math.round(S.d.weight * fM);
    const c = Math.max(0, Math.round((cal - (p * 4) - (f * 9)) / 4));
    return { cal, p, f, c };
}

function calc1RM(w, r) { return Math.round(w * (1 + r / 30)); }

// ─── Meal Plan Database ───
const MEALS = {

        { name: 'Tilapia Fillet (6oz)',                 p: 34, f: 3,  c: 0,  cal: 163, tags: ['lean'] },
        { name: 'Shrimp (6oz)',                         p: 28, f: 2,  c: 0,  cal: 128, tags: ['lean'] },
        { name: 'Cod Fillet (6oz)',                     p: 32, f: 2,  c: 0,  cal: 146, tags: ['lean'] },
        { name: 'Cottage Cheese (1 cup, low-fat)',      p: 28, f: 3,  c: 6,  cal: 163, tags: ['lean', 'morning'] },
        { name: '93% Lean Ground Beef (5oz)',           p: 32, f: 10, c: 0,  cal: 218, tags: [] },
        { name: 'Pork Tenderloin (5oz)',                p: 30, f: 4,  c: 0,  cal: 156, tags: ['lean'] },
        { name: 'Deli Turkey Breast (4oz)',             p: 22, f: 1,  c: 2,  cal: 105, tags: ['lean'] },
        { name: 'Tofu, Firm (6oz)',                     p: 14, f: 6,  c: 2,  cal: 118, tags: ['lean'] },
        { name: 'Tempeh (4oz)',                         p: 20, f: 9,  c: 7,  cal: 193, tags: [] },
        { name: 'Whey Protein Shake (1 scoop)',         p: 25, f: 2,  c: 3,  cal: 130, tags: ['lean', 'morning'] },
        { name: 'Bison (5oz)',                          p: 34, f: 7,  c: 0,  cal: 199, tags: [] },
    ],
    carbs: [
        { name: 'White Rice (1 cup cooked)',            p: 4,  f: 0,  c: 45, cal: 200, tags: [] },
        { name: 'Sweet Potato (1 medium)',              p: 2,  f: 0,  c: 26, cal: 112, tags: [] },

function generateMealPlan(targetCal, targetP, targetF, targetC) {
    const goal = S.d.goal || 'maintain';
    const used = new Set();

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Score item against macro targets; pick randomly from top 3 matches for variety
    function pickBest(pool, tP, tF, tC, preferTag) {
        const avail = pool.filter(x => !used.has(x.name));
        const pref = preferTag ? avail.filter(x => x.tags && x.tags.includes(preferTag)) : [];
        const src = pref.length >= 2 ? pref : (avail.length ? avail : pool.slice());
        const scored = src.map(item => {
            const pE = tP > 0 ? Math.abs(item.p - tP) / tP : 0;
            const fE = tF > 0 ? Math.abs(item.f - tF) / tF : 0;
            const cE = tC > 0 ? Math.abs(item.c - tC) / tC : 0;
            return { item, score: pE + fE + cE };
        }).sort((a, b) => a.score - b.score);
        const pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))].item;
        used.add(pick.name);
        return pick;
    }

    function pickRandom(pool) {
        const avail = shuffle(pool.filter(x => !used.has(x.name)));
        const pick = avail.length ? avail[0] : pool[Math.floor(Math.random() * pool.length)];
        used.add(pick.name);
        return pick;
    }

    const meals = [];
    let totP = 0, totF = 0, totC = 0, totCal = 0;
    const proPref = goal === 'cut' ? 'lean' : null;
    const fatPref = goal === 'bulk' ? 'caloric' : null;

    // Distribute daily macro targets across meals by percentage
    const splits = goal === 'bulk'
        ? [0.25, 0.30, 0.28, 0.12, 0.05]   // B / L / D / pre-workout / evening
        : [0.25, 0.30, 0.30, 0.15];         // B / L / D / snack

    // Breakfast — morning-tagged picks scored against breakfast share of targets
    const b = splits[0];
    meals.push({ label: 'Meal 1 — Breakfast', items: [
        pickBest(MEALS.proteins, targetP * b, 0, 0, 'morning'),
        pickBest(MEALS.carbs, 0, 0, targetC * b, 'morning'),
    ]});

    // Lunch — protein + carb scored against lunch share; veggie random
    const l = splits[1];
    const lunchItems = [
        pickBest(MEALS.proteins, targetP * l, 0, 0, proPref),
        pickBest(MEALS.carbs, 0, 0, targetC * l, null),
        pickRandom(MEALS.veggies),
    ];
    if (goal === 'bulk') lunchItems.push(pickBest(MEALS.fats, 0, targetF * l, 0, fatPref));
    meals.push({ label: 'Meal 2 — Lunch', items: lunchItems });

    // Dinner — full protein + carb + fat + veggie, all scored against dinner share
    const d = splits[2];
    meals.push({ label: 'Meal 3 — Dinner', items: [
        pickBest(MEALS.proteins, targetP * d, 0, 0, proPref),
        pickBest(MEALS.carbs, 0, 0, targetC * d, null),
        pickBest(MEALS.fats, 0, targetF * d, 0, fatPref),
        pickRandom(MEALS.veggies),
    ]});

    // Snack(s)
    const s = splits[3];
    if (goal === 'bulk') {
        meals.push({ label: 'Pre-Workout Snack', items: [
            pickBest(MEALS.proteins, targetP * s, 0, 0, null),
            pickBest(MEALS.carbs, 0, 0, targetC * s, null),
        ]});
        meals.push({ label: 'Evening Snack', items: [
            pickBest(MEALS.fats, 0, targetF * splits[4], 0, 'caloric'),
        ]});
    } else {
        const snackPool = [...MEALS.fats, ...MEALS.proteins.filter(x => x.tags && x.tags.includes('morning'))];
        meals.push({ label: 'Snack', items: [
            pickBest(snackPool, targetP * s * 0.5, targetF * s * 0.5, 0, null),
        ]});
    }

    meals.forEach(m => m.items.forEach(i => { totP += i.p; totF += i.f; totC += i.c; totCal += i.cal; }));
    return { meals, totP, totF, totC, totCal };
}

    ctx.fillStyle = GOLD; ctx.font = '400 10px Inter';

}

function route(input) {
    const step = S.step;

    // ── NAME ──
    if (step === 'ask_name') {
        S.d.name = input;
        say(`Good to meet you, <span class="gold">${S.d.name}</span>. Let's get to work.`);
        const pending = S.d._pendingTool;
        S.d._pendingTool = null;
        S.step = 'menu';
        if (pending) setTimeout(() => route(pending), 400);
        else setTimeout(() => showMenu(), 600);

    // ── MENU ──
    } else if (step === 'menu' || step === 'post_result' || step === 'meal_done') {
        // Collect name on first tool selection
        if (!S.d.name && input !== 'coaching' && input !== 'program' && input !== 'back_menu') {
            S.d._pendingTool = input;
            S.step = 'ask_name';
            say("Before we dive in — what's your name?");
            return;

        if (input === 'meal_again') {
            showMealPlan();
            return;

        if (input === 'tdee_start') {
            S.step = 'tdee_sex';
            say("Let's build your calorie profile. What is your biological sex?");
            opts([ { label: 'Male', value: 'male' }, { label: 'Female', value: 'female' } ]);

function showMealPlan() {

    say(`Here's a sample day of eating for your <span class="gold">${S.d.goal === 'cut' ? 'fat loss' : S.d.goal === 'bulk' ? 'lean bulk' : 'maintenance'}</span> goal.`);

    let html = `<div class="meal-card"><h4>SAMPLE MEAL PLAN</h4>`;
    plan.meals.forEach(meal => {
        html += `<div class="meal-label">${meal.label}</div>`;
        meal.items.forEach(item => {
            html += `<div class="meal-item"><div class="meal-name">${item.name}</div><div class="meal-macros">${item.cal} cal · ${item.p}P · ${item.f}F · ${item.c}C</div></div>`;
        });

    html += `<div class="meal-total"><span>DAILY TOTAL</span><span class="gold">${plan.totCal} cal · ${plan.totP}P · ${plan.totF}F · ${plan.totC}C</span></div>`;
    html += `<div class="meal-total"><span>YOUR TARGET</span><span>${m.cal} cal · ${m.p}P · ${m.f}F · ${m.c}C</span></div>`;
    html += `<div class="meal-disclaimer">This is a sample template. Adjust portions to hit your exact targets. A full custom meal plan is included with BTF Coaching.</div>`;

                { icon: '🔄', label: 'Generate Another Day', value: 'meal_again' },

                { icon: '🔙', label: 'Back to Menu', value: 'back_menu' },

            S.step = 'meal_done';
        }, 500);
    }, 300);
}

// ─── Progress Projector ───
function showProgressProjector() {
    const goal = S.d.goal;
    let weeklyChange;
    if (goal === 'cut') weeklyChange = -1.0;  // ~1 lb/week loss at 500 deficit
    else if (goal === 'bulk') weeklyChange = 0.5;  // ~0.5 lb/week gain at 300 surplus
    else weeklyChange = 0;

    const milestones = [4, 8, 12];
    const isLoss = weeklyChange < 0;

    say(`Based on your <span class="gold">${goal === 'cut' ? 'fat loss' : goal === 'bulk' ? 'lean bulk' : 'maintenance'}</span> targets, here's what consistent effort looks like:`);

    let html = `<div class="prog-card"><h4>YOUR PROJECTED PROGRESS</h4>`;
    milestones.forEach(w => {
        const change = Math.round(weeklyChange * w * 10) / 10;
        const projected = Math.round((S.d.weight + change) * 10) / 10;
        const sign = change > 0 ? '+' : '';
        const cls = isLoss ? 'loss' : (change > 0 ? 'gain' : '');
        html += `<div class="prog-row">`;
        html += `<div class="prog-week">Week ${w}</div>`;
        html += `<div class="prog-weight">${projected} lbs</div>`;
        html += `<div class="prog-change ${cls}">${sign}${change} lbs</div>`;
        html += `</div>`;
    });

    if (goal === 'cut') {
        html += `<div class="prog-note">Based on a 500 cal/day deficit (~1 lb/week). Maintaining high protein preserves muscle tissue during the cut.</div>`;
    } else if (goal === 'bulk') {
        html += `<div class="prog-note">Based on a 300 cal/day surplus (~0.5 lb/week). A controlled surplus minimizes fat gain while maximizing muscle development.</div>`;
    } else {
        html += `<div class="prog-note">At maintenance, body weight stays relatively stable. This phase is ideal for body recomposition with proper training.</div>`;
    }
    html += `</div>`;

    setTimeout(() => {
        addEl(html);
        setTimeout(() => {
            if (goal !== 'maintenance') {
                say(`Imagine where you'll be in 12 weeks with real accountability. That's what <span class="gold">BTF Coaching</span> is built for.`);
            }
            opts([
                { icon: '🤝', label: 'Apply for Coaching — Accelerate Results', value: 'coaching' },
                { icon: '🔙', label: 'Back to Menu', value: 'back_menu' },
            ]);
            S.step = 'post_result';
        }, 600);
    }, 300);
}

// ─── TDEE Result Card ───
function showTDEECard(goal, unlocked) {
    document.querySelectorAll('.rz, .gsw, .cta').forEach(e => e.remove());

    const canvas = document.createElement('canvas');
    canvas.width = 480; canvas.height = 580;
    const zone = document.createElement('div');
    zone.className = 'rz' + (unlocked ? '' : ' locked');
    zone.appendChild(canvas);

    if (!unlocked) {
        const ov = document.createElement('div');
        ov.className = 'lock-ov';
        ov.innerHTML = `<div class="ico">🔒</div><h3>RESULTS LOCKED</h3><p>Your macro breakdown is ready. Tap unlock to reveal and save.</p><button id="ubtn">UNLOCK MY RESULTS</button>`;
        zone.appendChild(ov);
    }

    chat.appendChild(zone);
    drawTDEE(canvas, goal);
    scroll();

    if (!unlocked) {
        document.getElementById('ubtn').onclick = () => {
            zone.classList.remove('locked');
            zone.querySelector('.lock-ov').remove();
            S.step = 'tdee_unlocked';

            // Save lead with results
            const m = calcMacros(S.d.tdee, goal);
            saveLead({
                name: S.d.name, email: S.d.email,
                tool: 'Calorie Calculator',
                bmr: S.d.bmr, tdee: S.d.tdee, goal: goal,
                macros: m, age: S.d.age, sex: S.d.sex,
                weight: S.d.weight, height: S.d.height
            });

            say("Your BTF Macro Card is unlocked! Screenshot to save.");
            setTimeout(() => {
                say("Switch goals to regenerate your card:");
                addGoalSwitch();
                showSoftSell();
            }, 500);
        };
    } else {
        setTimeout(() => scroll(), 100);
    }
}

// ─── Hydration Result ───
function showHydrationResult() {
    const weight = S.d.hydWeight || S.d.weight;
    const mult = S.d.hydMult;
    const base = Math.round(weight * 0.5);
    const daily = Math.round(base * mult);
    const liters = (daily * 0.02957).toFixed(1);
    const bottles = (daily / 16.9).toFixed(1);

    setTimeout(() => {
        addEl(`<div class="stat-card"><div class="lbl">Daily Hydration Target</div><div class="val">${daily}</div><div class="sub">oz per day (~${liters}L · ${bottles} standard water bottles)</div></div>`);
        setTimeout(() => {
            addEl(`<div class="prog-card"><h4>HYDRATION BREAKDOWN</h4>
                <div class="prog-row"><div class="prog-week">Base (bodyweight ÷ 2)</div><div class="prog-weight">${base} oz</div></div>
                <div class="prog-row"><div class="prog-week">Activity adjustment</div><div class="prog-weight">+${daily - base} oz</div></div>
                <div class="prog-row"><div class="prog-week">Daily total</div><div class="prog-weight" style="color:var(--gold)">${daily} oz</div></div>
                <div class="prog-note">Spread intake evenly across the day. Add 8–16 oz for every 30 min of intense training or in hot weather. Urine should be pale yellow — that's your real-time gauge.</div>
            </div>`);
            showSoftSell();
        }, 400);
    }, 300);
}

// ─── Body Fat Result ───
function showBFResult() {
    const height = S.d.bfHeight || S.d.height;
    let bf;
    if (S.d.sex === 'male') {
        bf = 86.010 * Math.log10(S.d.bfWaist - S.d.bfNeck) - 70.041 * Math.log10(height) + 36.76;
    } else {
        bf = 163.205 * Math.log10(S.d.bfWaist + S.d.bfHip - S.d.bfNeck) - 97.684 * Math.log10(height) - 78.387;
    }
    bf = Math.max(3, Math.round(bf * 10) / 10);
    S.d.bf = bf;

    let category, catColor;
    if (S.d.sex === 'male') {
        if (bf < 6)       { category = 'Essential Fat'; catColor = '#f87171'; }
        else if (bf < 14) { category = 'Athlete';       catColor = '#4ade80'; }
        else if (bf < 18) { category = 'Fitness';       catColor = '#4ade80'; }
        else if (bf < 25) { category = 'Acceptable';    catColor = '#60a5fa'; }
        else              { category = 'High';           catColor = '#f87171'; }
    } else {
        if (bf < 14)      { category = 'Essential Fat'; catColor = '#f87171'; }
        else if (bf < 21) { category = 'Athlete';       catColor = '#4ade80'; }
        else if (bf < 25) { category = 'Fitness';       catColor = '#4ade80'; }
        else if (bf < 32) { category = 'Acceptable';    catColor = '#60a5fa'; }
        else              { category = 'High';           catColor = '#f87171'; }
    }

    let breakdown = `<div class="prog-card"><h4>BODY COMPOSITION</h4>`;
    if (S.d.weight) {
        const fatMass = Math.round(S.d.weight * (bf / 100) * 10) / 10;
        const leanMass = Math.round((S.d.weight - fatMass) * 10) / 10;
        breakdown += `<div class="prog-row"><div class="prog-week">Fat Mass</div><div class="prog-weight">${fatMass} lbs</div></div>`;
        breakdown += `<div class="prog-row"><div class="prog-week">Lean Mass</div><div class="prog-weight">${leanMass} lbs</div></div>`;
    }
    breakdown += `<div class="prog-row"><div class="prog-week">Category</div><div class="prog-weight" style="color:${catColor}">${category}</div></div>`;
    breakdown += `<div class="prog-note">Measured using the U.S. Navy circumference method. For regular body composition check-ins and a plan built around your numbers, BTF Coaching tracks this with you every week.</div>`;
    breakdown += `</div>`;

    setTimeout(() => {
        addEl(`<div class="stat-card"><div class="lbl">Body Fat Percentage</div><div class="val">${bf}%</div><div class="sub" style="color:${catColor}">${category}</div></div>`);
        setTimeout(() => {
            addEl(breakdown);
            setTimeout(() => {
                say("Want to know whether you should cut, bulk, or recomp based on this?");
                opts([
                    { icon: '🎯', label: 'Get My Cut/Bulk/Recomp Recommendation', value: 'cbr_start' },
                    { icon: '🤝', label: 'Apply for Coaching',                     value: 'coaching'  },
                    { icon: '🔙', label: 'Back to Menu',                            value: 'back_menu' },
                ]);
                S.step = 'post_result';
            }, 500);
        }, 400);
    }, 300);
}

// ─── Cut / Bulk / Recomp Result ───
function showCBRResult() {
    const bf = S.d.bf;
    const sex = S.d.sex;
    const cbrGoal = S.d.cbrGoal;

    let phase, recommendation, reason, detail;
    if (sex === 'male') {
        if (bf > 22) {
            phase = 'CUT'; recommendation = 'Fat Loss Phase';
            reason = `At ${bf}% body fat, fat loss is the priority. Excess body fat reduces insulin sensitivity and testosterone — both of which work against muscle building.`;
            detail = 'Get lean first. When you start your bulk from a leaner base, you\'ll build more muscle and less fat.';
        } else if (bf < 12) {
            phase = 'BULK'; recommendation = 'Lean Bulk';
            reason = `At ${bf}%, your body is primed to build. Low body fat means better insulin sensitivity and favorable anabolic hormones.`;
            detail = 'A modest 200–300 calorie surplus with high protein will maximize muscle gain while keeping fat gain minimal.';
        } else {
            phase = 'RECOMP'; recommendation = 'Body Recomposition';
            reason = `At ${bf}%, you\'re in the ideal zone to simultaneously lose fat and build muscle — the sweet spot for recomposition.`;
            detail = 'Eat at maintenance, keep protein at 0.8–1g/lb, and train with progressive overload. Progress is steady, and you improve on both fronts.';
        }
    } else {
        if (bf > 30) {
            phase = 'CUT'; recommendation = 'Fat Loss Phase';
            reason = `At ${bf}% body fat, a focused cut will improve your energy, health markers, and body composition dramatically.`;
            detail = 'Build momentum with a cut first. A leaner starting point makes every subsequent phase more effective.';
        } else if (bf < 20) {
            phase = 'BULK'; recommendation = 'Lean Bulk';
            reason = `At ${bf}%, your hormonal environment is favorable for muscle growth. Now is the right time to build.`;
            detail = 'A controlled surplus with sufficient protein will drive meaningful muscle gain without significant fat gain.';
        } else {
            phase = 'RECOMP'; recommendation = 'Body Recomposition';
            reason = `At ${bf}%, recomposition is your best path — you can lose fat and gain muscle simultaneously with the right approach.`;
            detail = 'Eat at or slightly below maintenance, keep protein high, and stay consistent with resistance training.';
        }
    }
    if (cbrGoal === 'lose_fat' && phase !== 'CUT') detail += ' Since fat loss is your priority, a mild deficit (200–300 cal) can accelerate results without sacrificing muscle.';
    if (cbrGoal === 'build_muscle' && phase !== 'BULK') detail += ' Since building muscle is your focus, prioritize protein (0.8–1g/lb) and progressive overload regardless of phase.';

    const phaseColor = phase === 'CUT' ? '#f87171' : phase === 'BULK' ? '#4ade80' : '#60a5fa';

    setTimeout(() => {
        addEl(`<div class="stat-card"><div class="lbl">Recommended Phase</div><div class="val" style="font-size:28px;color:${phaseColor}">${phase}</div><div class="sub">${recommendation}</div></div>`);
        setTimeout(() => {
            addEl(`<div class="prog-card"><h4>YOUR RECOMMENDATION</h4>
                <div class="prog-row"><div class="prog-week">Body Fat</div><div class="prog-weight">${bf}%</div></div>
                <div class="prog-row"><div class="prog-week">Phase</div><div class="prog-weight" style="color:${phaseColor}">${recommendation}</div></div>
                <div class="prog-note">${reason}</div>
                <div class="prog-note" style="margin-top:8px;color:#aaa">${detail}</div>
            </div>`);
            setTimeout(() => {
                say(`A <span class="gold">BTF Coaching</span> plan takes this recommendation and builds it into a full 12-week roadmap — custom training, nutrition targets, and weekly accountability.`);
                opts([
                    { icon: '🤝', label: 'Apply for Coaching',                    value: 'coaching'   },
                    { icon: '📊', label: 'Calculate My Calories for This Phase',  value: 'tdee_start' },
                    { icon: '🔙', label: 'Back to Menu',                           value: 'back_menu'  },
                ]);
                S.step = 'post_result';
            }, 600);
        }, 400);
    }, 300);
}

// ─── Input ───
function submit() {
    const v = inp.value.trim();
    if (!v) return;
    pushHistory();
    say(v, 'usr');
    showUndoButton();
    inp.value = '';
    route(v);
}
inp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
sbtn.onclick = submit;

// ─── iOS Keyboard Fix ───
// When the iOS keyboard opens, scroll the chat to bottom so the user can see messages
inp.addEventListener('focus', () => {
    setTimeout(() => {
        scroll();
        // On iOS in iframe, scroll the input into view
        inp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);
});

// Use visualViewport API to handle keyboard resize
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        // Adjust app height to visible viewport (excluding keyboard)
        const vh = window.visualViewport.height;
        document.getElementById('app').style.height = vh + 'px';
        scroll();
    });
}

};
